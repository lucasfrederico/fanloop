name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build and test
        run: mvn -B -e clean verify

  manifests-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install tools
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          KUSTOMIZE_VERSION=v5.4.3
          curl -sL "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2F${KUSTOMIZE_VERSION}/kustomize_${KUSTOMIZE_VERSION}_linux_amd64.tar.gz" | tar xz -C /usr/local/bin
          go install github.com/yannh/kubeconform/cmd/kubeconform@latest || true
      - name: Helm lint and template
        run: |
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update charts/fanloop
          helm lint charts/fanloop
          helm template fanloop charts/fanloop > /tmp/fanloop.yaml
      - name: Kustomize build
        run: |
          kustomize build gitops/overlays/dev > /tmp/dev.yaml
          kustomize build gitops/overlays/prod > /tmp/prod.yaml
      - name: Kubeconform app manifests
        run: |
          kubeconform -strict -ignore-missing-schemas /tmp/fanloop.yaml || true

  e2e-kind:
    runs-on: ubuntu-latest
    needs: [build-test]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven
      - name: Build image
        run: |
          mvn -B -e clean package -DskipTests
          docker build -t ghcr.io/lucasfrederico/fanloop:ci .
      - name: Create kind cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: fanloop-ci
      - name: Load image into kind
        run: kind load docker-image ghcr.io/lucasfrederico/fanloop:ci --name fanloop-ci
      - name: Install Helm chart directly (CI uses local image tag)
        run: |
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          helm repo add bitnami https://charts.bitnami.com/bitnami
          helm repo update
          helm dependency update charts/fanloop
          helm install fanloop charts/fanloop \
            --namespace fanloop --create-namespace \
            --set image.repository=ghcr.io/lucasfrederico/fanloop \
            --set image.tag=ci \
            --set serviceMonitor.enabled=false \
            --set autoscaling.enabled=false \
            --set replicaCount=2
          kubectl -n fanloop rollout status deploy --timeout=300s
      - name: Smoke test
        run: |
          curl -fsSL https://github.com/vi/websocat/releases/latest/download/websocat.x86_64-unknown-linux-musl -o /usr/local/bin/websocat
          chmod +x /usr/local/bin/websocat
          websocat --version
          kubectl -n fanloop port-forward svc/fanloop-fanloop 8080:8080 &
          sleep 5
          BASE=http://localhost:8080 WS=ws://localhost:8080/ws API_KEY=dev-key ./scripts/smoke-test.sh
