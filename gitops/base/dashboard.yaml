apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fanloop-dashboard
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/lucasfrederico/fanloop
    targetRevision: master
    path: gitops/manifests/dashboard
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
