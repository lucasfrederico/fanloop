replicaCount: 2

image:
  repository: ghcr.io/lucasfrederico/fanloop
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

apiKey: "dev-key"

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

serviceMonitor:
  enabled: true
  interval: 15s

redis:
  enabled: true
  architecture: standalone
  auth:
    enabled: false
